<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<title>Carmel Tennis — Booking Grid Variants</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;background:#1a1a1a;font-family:"Heebo",system-ui,sans-serif}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="variant-editorial.jsx"></script>
<script type="text/babel" src="variant-sport.jsx"></script>
<script type="text/babel" src="variant-quiet.jsx"></script>
<script type="text/babel" src="variant-dark.jsx"></script>
<script type="text/babel" src="variant-sport-v2.jsx"></script>
<script type="text/babel" src="variant-sport-v3.jsx"></script>
<script type="text/babel" src="variant-sport-v31.jsx"></script>
<script type="text/babel" src="upgrade-mockups.jsx"></script>

<script type="text/babel">
  function App() {
    return (
      <DesignCanvas title="Carmel Tennis · Booking grid" subtitle="Variant B v3 + UX upgrade mockups · light + dark · tap moons to flip themes">
        <DCSection id="v31" title="B v3.1 — adaptive hero (recommended)" subtitle="~72px when there's a next-up booking (the hero earns its pixels by answering 'when am I playing?' without a tap), collapses to ~44px when there isn't (no point spending pixels on absence). Theme toggle relocated to partner bar — settings tier, not header tier.">
          <DCArtboard id="sport-v31-light" label="B v3.1 — light · has next-up" width={380} height={820}>
            <VariantSportV31 initialTheme="light" />
          </DCArtboard>
          <DCArtboard id="sport-v31-dark" label="B v3.1 — dark · has next-up" width={380} height={820}>
            <VariantSportV31 initialTheme="dark" />
          </DCArtboard>
        </DCSection>

        <DCSection id="v3" title="B v3 — compact header + dark mode" subtitle="Hero collapsed from ~150px → ~44px (one strip: day · next-up · weather · theme toggle). Partner row absorbs the cap counter. Same UX upgrades as v2; full theme via CSS variables.">
          <DCArtboard id="sport-v3-light" label="B v3 — light" width={380} height={820}>
            <VariantSportV3 initialTheme="light" />
          </DCArtboard>
          <DCArtboard id="sport-v3-dark" label="B v3 — dark" width={380} height={820}>
            <VariantSportV3 initialTheme="dark" />
          </DCArtboard>
        </DCSection>

        <DCSection id="ux-light" title="UX upgrade mockups — light" subtitle="One tile per move from the brainstorm. Each isolates a single interaction or affordance so you can evaluate them independently.">
          <style>{muxStyles}</style>
          <DCArtboard id="m-confirm-l" label="Confirm-on-2nd-tap" width={320} height={280}><MockConfirmTap theme="light" /></DCArtboard>
          <DCArtboard id="m-pending-l" label="Pending + failure" width={320} height={280}><MockPending theme="light" /></DCArtboard>
          <DCArtboard id="m-cap-l" label="Live cap counter" width={320} height={280}><MockCapCounter theme="light" /></DCArtboard>
          <DCArtboard id="m-busy-l" label="Busy-hour heat" width={320} height={280}><MockBusyHeat theme="light" /></DCArtboard>
          <DCArtboard id="m-weather-l" label="Weather per day" width={320} height={280}><MockWeather theme="light" /></DCArtboard>
          <DCArtboard id="m-recents-l" label="Smart partner picker" width={320} height={280}><MockRecents theme="light" /></DCArtboard>
          <DCArtboard id="m-lock-l" label="3h cancel lock" width={320} height={280}><MockLock theme="light" /></DCArtboard>
          <DCArtboard id="m-wait-l" label="Waitlist sheet" width={320} height={280}><MockWaitlist theme="light" /></DCArtboard>
          <DCArtboard id="m-recur-l" label="Recurring bookings" width={320} height={280}><MockRecurring theme="light" /></DCArtboard>
          <DCArtboard id="m-find-l" label="Find-me-a-slot" width={320} height={280}><MockFindSlot theme="light" /></DCArtboard>
          <DCArtboard id="m-invite-l" label="Invite (not auto-confirm)" width={320} height={280}><MockInvite theme="light" /></DCArtboard>
          <DCArtboard id="m-check-l" label="Pre-game checklist" width={320} height={280}><MockChecklist theme="light" /></DCArtboard>
          <DCArtboard id="m-rate-l" label="Post-game rating" width={320} height={280}><MockRating theme="light" /></DCArtboard>
          <DCArtboard id="m-online-l" label="Friends online" width={320} height={280}><MockOnline theme="light" /></DCArtboard>
          <DCArtboard id="m-next-l" label="Live next-up hero" width={320} height={280}><MockNextUp theme="light" /></DCArtboard>
        </DCSection>

        <DCSection id="ux-dark" title="UX upgrade mockups — dark" subtitle="Same tiles in dark mode for parity check.">
          <DCArtboard id="m-confirm-d" label="Confirm-on-2nd-tap" width={320} height={280}><MockConfirmTap theme="dark" /></DCArtboard>
          <DCArtboard id="m-pending-d" label="Pending + failure" width={320} height={280}><MockPending theme="dark" /></DCArtboard>
          <DCArtboard id="m-cap-d" label="Live cap counter" width={320} height={280}><MockCapCounter theme="dark" /></DCArtboard>
          <DCArtboard id="m-busy-d" label="Busy-hour heat" width={320} height={280}><MockBusyHeat theme="dark" /></DCArtboard>
          <DCArtboard id="m-weather-d" label="Weather per day" width={320} height={280}><MockWeather theme="dark" /></DCArtboard>
          <DCArtboard id="m-recents-d" label="Smart partner picker" width={320} height={280}><MockRecents theme="dark" /></DCArtboard>
          <DCArtboard id="m-lock-d" label="3h cancel lock" width={320} height={280}><MockLock theme="dark" /></DCArtboard>
          <DCArtboard id="m-wait-d" label="Waitlist sheet" width={320} height={280}><MockWaitlist theme="dark" /></DCArtboard>
          <DCArtboard id="m-recur-d" label="Recurring bookings" width={320} height={280}><MockRecurring theme="dark" /></DCArtboard>
          <DCArtboard id="m-find-d" label="Find-me-a-slot" width={320} height={280}><MockFindSlot theme="dark" /></DCArtboard>
          <DCArtboard id="m-invite-d" label="Invite (not auto-confirm)" width={320} height={280}><MockInvite theme="dark" /></DCArtboard>
          <DCArtboard id="m-check-d" label="Pre-game checklist" width={320} height={280}><MockChecklist theme="dark" /></DCArtboard>
          <DCArtboard id="m-rate-d" label="Post-game rating" width={320} height={280}><MockRating theme="dark" /></DCArtboard>
          <DCArtboard id="m-online-d" label="Friends online" width={320} height={280}><MockOnline theme="dark" /></DCArtboard>
          <DCArtboard id="m-next-d" label="Live next-up hero" width={320} height={280}><MockNextUp theme="dark" /></DCArtboard>
        </DCSection>
        <DCSection id="v2" title="B v2 — first refined pass" subtitle="Earlier version with the bigger hero, kept for comparison.">
          <DCArtboard id="sport-v2" label="B v2 — clay refined" width={380} height={820}>
            <VariantSportV2 />
          </DCArtboard>
        </DCSection>
        <DCSection id="grids" title="Original visual directions" subtitle="The four exploration variants from earlier.">
          <DCArtboard id="editorial" label="A — Editorial calm" width={380} height={780}>
            <VariantEditorial />
          </DCArtboard>
          <DCArtboard id="sport" label="B — Sport / clay (v1)" width={380} height={780}>
            <VariantSport />
          </DCArtboard>
          <DCArtboard id="quiet" label="C — Quiet / Apple-like" width={380} height={780}>
            <VariantQuiet />
          </DCArtboard>
          <DCArtboard id="dark" label="D — Dark / cinematic" width={380} height={780}>
            <VariantDark />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
