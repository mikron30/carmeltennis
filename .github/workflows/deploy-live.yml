name: Build and deploy to DigitalOcean

on:
  push:
    branches: [main]
    paths-ignore:
      - 'public/**'

concurrency:
  group: hosting-live
  cancel-in-progress: false

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - run: flutter build web --release

      - name: Commit public/ to repo
        run: |
          rm -rf public
          mkdir public
          cp -r build/web/. public/
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f public/
          git diff --cached --quiet && echo "No changes" || git commit -m "build: update public/ [skip ci]"
          git push
